<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Révise! 📚</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<meta name="theme-color" content="#4F46E5">
<style>
:root{
  --bg:#F0F4FF;--white:#FFFFFF;
  --fr:#7C3AED;--fr-bg:#EDE9FE;
  --ma:#2563EB;--ma-bg:#DBEAFE;
  --ok:#16A34A;--ok-bg:#DCFCE7;
  --err:#DC2626;--err-bg:#FEE2E2;
  --star:#F59E0B;--streak:#F97316;
  --text:#1E1B4B;--muted:#6B7280;
  --primary:#4F46E5;--primary-dark:#3730A3;
  --card:#FFFFFF;--radius:16px;
  --shadow:0 4px 20px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;}
#frame{padding-bottom:84px;min-height:100vh;}

/* HEADER */
.hdr{position:sticky;top:0;z-index:10;background:var(--bg);padding:16px 20px 10px;display:flex;justify-content:space-between;align-items:center;}
.hdr-title{font-size:22px;font-weight:900;color:var(--primary);letter-spacing:-0.5px;}
.hdr-pills{display:flex;gap:8px;}
.pill{display:flex;align-items:center;gap:4px;background:var(--white);border-radius:100px;padding:6px 12px;font-weight:800;font-size:14px;box-shadow:var(--shadow);}
.pill.s{color:var(--streak);}
.pill.e{color:var(--star);}

/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--white);border-top:1.5px solid #E5E7EB;display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0;border:none;background:none;cursor:pointer;font-family:inherit;color:var(--muted);font-size:11px;font-weight:700;gap:2px;transition:.15s;}
.nb .ni{font-size:22px;line-height:1;}
.nb.active{color:var(--primary);}
.nb:active{transform:scale(0.9);}

/* CARDS */
.card{background:var(--card);border-radius:var(--radius);padding:20px;margin:0 16px 12px;box-shadow:var(--shadow);}
.section-title{font-size:15px;font-weight:800;color:var(--text);margin:4px 16px 10px;}

/* TODAY CARD */
.today-card{background:linear-gradient(135deg,var(--primary) 0%,#7C3AED 100%);color:white;border-radius:var(--radius);padding:24px 20px;margin:0 16px 14px;box-shadow:0 8px 24px rgba(79,70,229,.35);}
.tc-label{font-size:12px;font-weight:700;opacity:.8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.tc-title{font-size:21px;font-weight:900;margin-bottom:6px;}
.tc-sub{font-size:13px;opacity:.8;margin-bottom:18px;}
.btn-start{background:white;color:var(--primary);border:none;border-radius:100px;padding:13px 28px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 12px rgba(0,0,0,.15);display:inline-flex;align-items:center;gap:8px;}
.btn-start:active{transform:scale(0.95);}

/* DONE BANNER */
.done-card{background:var(--ok-bg);border-radius:var(--radius);padding:20px;margin:0 16px 14px;border:2px solid #86EFAC;text-align:center;}
.done-score{font-size:36px;font-weight:900;color:var(--ok);}
.done-label{font-size:14px;color:#15803D;font-weight:700;margin-top:4px;}

/* SUBJECT GRID */
.subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 14px;}
.subj-card{border-radius:var(--radius);padding:16px;cursor:pointer;transition:transform .15s;box-shadow:var(--shadow);}
.subj-card.fr{background:var(--fr-bg);}
.subj-card.ma{background:var(--ma-bg);}
.subj-card:active{transform:scale(0.96);}
.sc-emoji{font-size:26px;}
.sc-name{font-size:13px;font-weight:800;margin-top:6px;color:var(--text);}
.sc-count{font-size:11px;color:var(--muted);margin-top:2px;}

/* STREAK MINI */
.streak-row{display:flex;gap:6px;margin:0 16px 14px;overflow-x:auto;padding-bottom:4px;}
.streak-day{min-width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.streak-day.done{background:var(--primary);color:white;}
.streak-day.today{background:var(--primary);color:white;box-shadow:0 0 0 3px rgba(79,70,229,.35);}
.streak-day.miss{background:#F3F4F6;color:var(--muted);}

/* PROGRESS BAR */
.pbar-wrap{background:#E5E7EB;border-radius:100px;height:8px;margin:0 16px 14px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--primary),#7C3AED);transition:width .35s ease;}

/* SESSION */
.sess-hdr{padding:12px 20px 8px;display:flex;justify-content:space-between;align-items:center;}
.sess-counter{font-size:13px;font-weight:800;color:var(--muted);}
.topic-tag{border-radius:100px;padding:4px 12px;font-size:11px;font-weight:800;}
.topic-tag.fr{background:var(--fr-bg);color:var(--fr);}
.topic-tag.ma{background:var(--ma-bg);color:var(--ma);}

.q-card{background:var(--card);border-radius:var(--radius);padding:24px 20px;margin:0 16px 14px;box-shadow:var(--shadow);text-align:center;}
.q-emoji{font-size:38px;margin-bottom:10px;}
.q-text{font-size:17px;font-weight:700;line-height:1.45;color:var(--text);}

.choices{display:grid;gap:10px;margin:0 16px;}
.choices.c2{grid-template-columns:1fr 1fr;}
.choices.c4{grid-template-columns:1fr 1fr;}
.choices.c1{grid-template-columns:1fr;}

.cbtn{background:var(--white);border:2.5px solid #E5E7EB;border-radius:14px;padding:15px 10px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;text-align:center;color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.06);line-height:1.3;}
.cbtn:active:not([disabled]){transform:scale(0.96);}
.cbtn:hover:not([disabled]){border-color:var(--primary);background:#F5F3FF;}
.cbtn.correct{background:var(--ok-bg);border-color:var(--ok);color:var(--ok);animation:pulse-g .4s;}
.cbtn.wrong{background:var(--err-bg);border-color:var(--err);color:var(--err);animation:shake .4s;}
.cbtn.reveal{background:var(--ok-bg);border-color:var(--ok);color:var(--ok);}
.cbtn[disabled]{cursor:default;}

.feedback{margin:10px 16px 0;border-radius:14px;padding:12px 16px;font-size:13px;font-weight:600;line-height:1.5;animation:fadeIn .25s;}
.feedback.ok{background:var(--ok-bg);color:#15803D;border:1.5px solid #86EFAC;}
.feedback.err{background:var(--err-bg);color:#B91C1C;border:1.5px solid #FCA5A5;}

.btn-next{display:block;width:calc(100% - 32px);margin:12px 16px 0;background:var(--primary);color:white;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;transition:transform .15s,background .15s;box-shadow:0 4px 12px rgba(79,70,229,.3);}
.btn-next:active{transform:scale(0.97);background:var(--primary-dark);}

/* RESULT */
.result-inner{text-align:center;padding:20px 0;}
.res-emoji{font-size:64px;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275);}
.res-pct{font-size:52px;font-weight:900;color:var(--primary);margin-top:8px;}
.res-label{font-size:14px;color:var(--muted);font-weight:700;}
.stars-row{font-size:40px;letter-spacing:6px;margin:14px 0;}
.new-badge{background:#FEF3C7;border-radius:12px;padding:10px 16px;margin:8px 16px 0;display:flex;align-items:center;gap:10px;animation:popIn .35s;}
.nb-emoji{font-size:24px;}
.nb-text{font-weight:700;font-size:13px;color:#92400E;}
.btn-again{display:block;width:calc(100% - 32px);margin:20px 16px 8px;background:var(--primary);color:white;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;box-shadow:0 4px 12px rgba(79,70,229,.3);}
.btn-again:active{transform:scale(0.97);}
.btn-home{display:block;width:calc(100% - 32px);margin:0 16px;background:white;color:var(--primary);border:2px solid var(--primary);border-radius:14px;padding:13px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;}

/* PROGRESS VIEW */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 14px;}
.stat-card{background:var(--white);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow);}
.stat-num{font-size:30px;font-weight:900;}
.stat-lbl{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:.04em;}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #F3F4F6;font-size:13px;}
.hist-row:last-child{border-bottom:none;}
.hist-date{font-weight:700;color:var(--muted);}
.hist-score{font-weight:800;color:var(--primary);}
.hist-stars{letter-spacing:2px;}

/* TROPHIES */
.trophy-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px;}
.tc{background:var(--white);border-radius:14px;padding:16px 12px;text-align:center;box-shadow:var(--shadow);transition:.15s;}
.tc.locked{opacity:.35;filter:grayscale(1);}
.tc-ico{font-size:32px;}
.tc-name{font-size:12px;font-weight:800;margin-top:6px;color:var(--text);}
.tc-desc{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.3;}

/* ANIMATIONS */
@keyframes pulse-g{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(0.7);opacity:0}100%{transform:scale(1);opacity:1}}
.pop-in{animation:popIn .3s cubic-bezier(.175,.885,.32,1.275);}
</style>
</head>

/* ══════════════════════════════════════════════════════
   GÉNÉRATEUR — MULTIPLICATION & DIVISION
══════════════════════════════════════════════════════ */

function genMultDiv() {
  function sh(arr) {
    const a=[...arr];
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    return a;
  }
  const exs=[];
  for(let a=2;a<=12;a++){
    for(let b=2;b<=12;b++){
      const r=a*b;
      // Wrong answers: plausibles et différents
      const wset=new Set();
      for(const d of [a,b,1,2,-a,-b,-1,-2]){
        const w=r+d;
        if(w>0&&w!==r)wset.add(w);
        if(wset.size>=3)break;
      }
      while(wset.size<3){const w=r+Math.floor(Math.random()*6)+1;if(w!==r)wset.add(w);}
      exs.push({id:`m${a}_${b}`,s:'ma',t:'mult',e:'✖️',q:`${a} × ${b} = ?`,
        c:sh([String(r),...[...wset].slice(0,3).map(String)]),a:String(r),ex:`${a} × ${b} = ${r}`});
      // Division correspondante
      const bws=[b+1,b>2?b-1:b+3,b+2].filter(x=>x>0&&x!==b).slice(0,3);
      while(bws.length<3)bws.push(b+bws.length+1);
      exs.push({id:`d${r}_${a}`,s:'ma',t:'div',e:'➗',q:`${r} ÷ ${a} = ?`,
        c:sh([String(b),...bws.map(String)]),a:String(b),ex:`${r} ÷ ${a} = ${b}  (car ${a} × ${b} = ${r})`});
    }
  }
  return exs;
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function todayStr(){return new Date().toISOString().slice(0,10);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function starsFor(pct){return pct>=90?3:pct>=70?2:pct>=50?1:0;}

function saveState(){
  try{localStorage.setItem('revise_v1',JSON.stringify({
    journal:S.journal,streak:S.streak,longestStreak:S.longestStreak,
    totalStars:S.totalStars,totalCorrect:S.totalCorrect,totalSessions:S.totalSessions,
    badges:S.badges,bestScore:S.bestScore,
  }));}catch(e){}
}

function loadState(){
  try{const d=JSON.parse(localStorage.getItem('revise_v1')||'{}');if(d)Object.assign(S,d);}catch(e){}
}

function updateStreak(){
  const today=todayStr();
  const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(!S.journal[today]&&!S.journal[yesterday]&&Object.keys(S.journal).length>0){
    const last=Object.keys(S.journal).sort().pop();
    const diff=Math.floor((new Date(today)-new Date(last))/86400000);
    if(diff>1)S.streak=0;
  }
}

function pickSession(){
  const recent=new Set();
  for(let i=1;i<=14;i++){
    const d=new Date(Date.now()-i*86400000).toISOString().slice(0,10);
    if(S.journal[d])(S.journal[d].ids||[]).forEach(id=>recent.add(id));
  }
  function pickN(topic,n){
    const pool=S.exercises.filter(e=>e.t===topic);
    if(!pool.length)return[];
    const fresh=pool.filter(e=>!recent.has(e.id));
    const use=fresh.length>=n?fresh:[...fresh,...pool.filter(e=>recent.has(e.id))];
    return shuffle(use).slice(0,n);
  }
  return shuffle([
    ...pickN('conj',3),...pickN('orth',2),...pickN('gram',1),...pickN('voc',1),
    ...pickN('mult',3),...pickN('div',1),...pickN('frac',1),...pickN('geo',1),
  ]);
}

function startSession(){
  const session=pickSession();
  setState({view:'session',session,sessionIdx:0,sessionAnswers:[],showFeedback:false,selectedAnswer:null});
}

function selectAnswer(ans){
  if(S.showFeedback)return;
  const ex=S.session[S.sessionIdx];
  const correct=ans===ex.a;
  setState({showFeedback:true,selectedAnswer:ans,sessionAnswers:[...S.sessionAnswers,{correct,id:ex.id}]});
}

function nextExercise(){
  if(S.sessionIdx+1>=S.session.length){endSession();}
  else{setState({sessionIdx:S.sessionIdx+1,showFeedback:false,selectedAnswer:null});}
}

function endSession(){
  const total=S.sessionAnswers.length;
  const correct=S.sessionAnswers.filter(a=>a.correct).length;
  const pct=Math.round(correct/total*100);
  const stars=starsFor(pct);
  const today=todayStr();
  const alreadyToday=!!S.journal[today];
  const journal={...S.journal,[today]:{correct,total,stars,pct,ids:S.sessionAnswers.map(a=>a.id)}};
  let streak=S.streak;
  if(!alreadyToday){
    const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
    streak=S.journal[yest]?streak+1:1;
  }
  const totalStars=S.totalStars+stars;
  const totalCorrect=S.totalCorrect+correct;
  const totalSessions=S.totalSessions+(alreadyToday?0:1);
  const bestScore=Math.max(S.bestScore,pct);
  const longestStreak=Math.max(S.longestStreak,streak);
  const ns={...S,journal,streak,longestStreak,totalStars,totalCorrect,totalSessions,bestScore};
  const earned=BADGES.filter(b=>!S.badges.includes(b.id)&&b.ok(ns)).map(b=>b.id);
  const badges=[...S.badges,...earned];
  Object.assign(S,{journal,streak,longestStreak,totalStars,totalCorrect,totalSessions,bestScore,badges});
  saveState();
  setState({view:'result',lastResult:{correct,total,stars,pct,earned}});
}

  choices+='</div>';
  // Feedback

}

    const j=S.journal[d];
    const s='⭐'.repeat(j.stars)+'☆'.repeat(3-j.stars);
    const dl=new Date(d).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
    histHtml+=`<div class="hist-row"><div class="hist-date">${esc(dl)}</div><div style="display:flex;gap:10px;align-items:center"><div class="hist-score">${j.pct}%</div><div class="hist-stars">${s}</div></div></div>`;
  });
  return`<div class="hdr"><div class="hdr-title">📊 Progrès</div></div>
<div class="stats-grid">
  <div class="stat-card"><div class="stat-num" style="color:var(--primary)">${S.totalSessions}</div><div class="stat-lbl">Séances</div></div>
  <div class="stat-card"><div class="stat-num" style="color:var(--ok)">${S.totalCorrect}</div><div class="stat-lbl">Bonnes réponses</div></div>
  <div class="stat-card"><div class="stat-num" style="color:var(--streak)">🔥${S.streak}</div><div class="stat-lbl">Streak actuel</div></div>
  <div class="stat-card"><div class="stat-num" style="color:var(--star)">⭐${S.totalStars}</div><div class="stat-lbl">Étoiles totales</div></div>
</div>
<div class="section-title">Historique</div>
<div class="card">${histHtml||'<div style="text-align:center;color:var(--muted);padding:16px">Pas encore de séance</div>'}</div>`;
}

function renderTrophies(){
  let html='';
  BADGES.forEach(b=>{
    const earned=S.badges.includes(b.id);
    html+=`<div class="tc ${earned?'':'locked'}"><div class="tc-ico">${b.e}</div><div class="tc-name">${esc(b.n)}</div><div class="tc-desc">${esc(b.d)}</div></div>`;
  });
  const nb=S.badges.length;
  return`<div class="hdr"><div class="hdr-title">🏆 Trophées</div><div class="hdr-pills"><div class="pill e">${nb}/${BADGES.length}</div></div></div>
<div style="text-align:center;padding:4px 16px 14px;font-size:13px;color:var(--muted);font-weight:700">${nb} trophée${nb!==1?'s':''} débloqué${nb!==1?'s':''}</div>
<div class="trophy-grid">${html}</div>`;
}

/* ══════════════════════════════════════════════════════
   EVENTS
══════════════════════════════════════════════════════ */

document.addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');
  if(!el)return;
  const raw=el.dataset.action;
  const ci=raw.indexOf(':');
  const action=ci>=0?raw.slice(0,ci):raw;
  const arg=ci>=0?raw.slice(ci+1):'';
  if(action==='nav'){setState({view:arg});}
  else if(action==='start'){if(!S.session.length||S.view!=='session')startSession();else setState({view:'session'});}
  else if(action==='answer'){selectAnswer(arg);}
  else if(action==='next'){nextExercise();}
});

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */

function init(){
  loadState();
  S.exercises=[...CONJ,...ORTH,...GRAM,...VOC,...FRAC,...GEO,...genMultDiv()];
  updateStreak();
  S.loaded=true;
  render();
}

init();
</script>
